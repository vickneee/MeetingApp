name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy-id","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:dummy","android_client_info":{"package_name":"com.meetup.meetingapp"}},"api_key":[{"current_key":"dummy-key"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Format Code
        run: ./gradlew ktlintFormat

      - name: Lint Code
        run: ./gradlew ktlintCheck

      - name: Build docs
        run: ./gradlew dokkaGenerate --no-daemon

      - name: Debug - List build output
        run: find . -path "*/dokka*" -type d | head -30

      - name: Debug - list dokka html contents
        run: ls -la ./app/build/dokka/html/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/build/dokka/html

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
