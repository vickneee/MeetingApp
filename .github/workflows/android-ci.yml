name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy-id","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:dummy","android_client_info":{"package_name":"com.meetup.meetingapp"}},"api_key":[{"current_key":"dummy-key"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Lint Code
        run: ./gradlew ktlintCheck

      - name: Format Code
        run: ./gradlew ktlintFormat
